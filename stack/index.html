<html lang="en">

<meta charset="UTF-8" />

<title>Flyxion Audio Field Monitor</title>
<style>
  :root {
    --green: #a6ff9f;
    --green-dim: rgba(120, 255, 130, 0.42);
    --green-faint: rgba(120, 255, 130, 0.14);
    --bg: #020802;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--green);
    font-family: "Courier New", ui-monospace, monospace;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #061606 0%, #020802 58%, #000 100%);
    touch-action: manipulation;
  }

  .crt::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 90;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.035) 0px,
        rgba(255,255,255,0.035) 1px,
        transparent 2px,
        transparent 4px
      );
    opacity: 0.22;
    mix-blend-mode: screen;
  }

  .crt::after {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 91;
    pointer-events: none;
    background:
      radial-gradient(circle at center, transparent 54%, rgba(0,0,0,0.74) 100%),
      linear-gradient(rgba(255,255,255,0.018), rgba(0,0,0,0.02));
  }

  #homeScreen {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    background: radial-gradient(circle at center, rgba(0, 50, 10, 0.28), rgba(0,0,0,0.88));
    transition: opacity 200ms ease;
  }

  #homeScreen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .homeInner {
    width: min(1100px, 100%);
  }

  .titleBlock {
    margin-bottom: 24px;
    text-align: center;
    text-shadow: 0 0 12px rgba(0,255,90,0.65);
  }

  .titleBlock h1 {
    margin: 0 0 8px;
    font-size: clamp(22px, 4vw, 44px);
    letter-spacing: 0.12em;
    font-weight: 400;
  }

  .titleBlock p {
    margin: 0;
    opacity: 0.78;
    font-size: 13px;
    letter-spacing: 0.08em;
  }

  #categoryGrid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 14px;
  }

  .categoryCard {
    min-height: 148px;
    border: 1px solid var(--green-dim);
    background:
      linear-gradient(135deg, rgba(120,255,130,0.10), rgba(0,25,0,0.78)),
      repeating-linear-gradient(90deg, transparent 0 10px, rgba(120,255,130,0.03) 11px 12px);
    color: var(--green);
    font-family: inherit;
    cursor: pointer;
    padding: 14px;
    text-align: left;
    box-shadow: 0 0 18px rgba(0,255,90,0.12), inset 0 0 24px rgba(0,255,90,0.045);
    position: relative;
    overflow: hidden;
  }

  .categoryCard::before {
    content: "";
    position: absolute;
    inset: -40%;
    background: conic-gradient(from var(--spin), transparent, rgba(130,255,130,0.13), transparent 35%);
    opacity: 0.6;
    animation: spin 14s linear infinite;
  }

  @property --spin {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  @keyframes spin { to { --spin: 360deg; } }

  .categoryCard span,
  .categoryCard small,
  .categoryCard strong {
    position: relative;
    z-index: 2;
    display: block;
  }

  .categoryCard strong {
    font-size: 15px;
    line-height: 1.2;
    min-height: 38px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .categoryCard span {
    margin-top: 16px;
    font-size: 28px;
    opacity: 0.92;
  }

  .categoryCard small {
    margin-top: 12px;
    opacity: 0.76;
  }

  .categoryCard:hover {
    background:
      linear-gradient(135deg, rgba(120,255,130,0.18), rgba(0,42,0,0.82)),
      repeating-linear-gradient(90deg, transparent 0 10px, rgba(120,255,130,0.05) 11px 12px);
  }

  #hud {
    position: fixed;
    inset: 0;
    z-index: 30;
    pointer-events: none;
    opacity: 0;
    transition: opacity 180ms ease;
  }

  #hud.visible { opacity: 1; }

  #trackTitle {
    position: fixed;
    top: 16px;
    left: 20px;
    right: 20px;
    z-index: 31;
    font-size: 13px;
    letter-spacing: 0.08em;
    opacity: 0.86;
    text-shadow: 0 0 10px rgba(0,255,90,0.8);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #categoryTitle {
    position: fixed;
    top: 39px;
    left: 20px;
    z-index: 31;
    font-size: 11px;
    opacity: 0.56;
    letter-spacing: 0.12em;
  }

  .controlButton {
    position: fixed;
    z-index: 40;
    pointer-events: auto;
    border: 1px solid var(--green-dim);
    background: rgba(0, 25, 0, 0.72);
    color: var(--green);
    font-family: inherit;
    cursor: pointer;
    padding: 10px 14px;
    box-shadow: 0 0 16px rgba(0,255,90,0.16);
  }

  #homeButton { left: 18px; bottom: 18px; }
  #tracksButton { right: 18px; bottom: 18px; font-size: 20px; padding: 8px 14px; }

  #drawer {
    position: fixed;
    right: 18px;
    bottom: 68px;
    z-index: 45;
    width: min(430px, calc(100vw - 36px));
    max-height: min(620px, calc(100vh - 110px));
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: rgba(0, 15, 0, 0.94);
    border: 1px solid var(--green-dim);
    box-shadow: 0 0 26px rgba(0,255,90,0.18);
    opacity: 0;
    transform: translateY(12px) scale(0.98);
    pointer-events: none;
    transition: opacity 160ms ease, transform 160ms ease;
  }

  #drawer.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .drawerHead {
    padding: 14px;
    border-bottom: 1px solid rgba(120,255,130,0.20);
    font-size: 12px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
  }

  #trackList {
    overflow: auto;
    padding: 8px;
  }

  .trackItem {
    display: block;
    width: 100%;
    margin: 5px 0;
    padding: 9px 10px;
    background: rgba(0, 42, 0, 0.52);
    border: 1px solid rgba(120,255,130,0.16);
    color: var(--green);
    font-family: inherit;
    text-align: left;
    cursor: pointer;
    font-size: 12px;
    line-height: 1.25;
  }

  .trackItem:hover,
  .trackItem.active {
    background: rgba(0, 72, 0, 0.72);
    border-color: rgba(120,255,130,0.46);
  }

  #startHint {
    position: fixed;
    inset: 0;
    z-index: 35;
    display: grid;
    place-items: center;
    pointer-events: none;
    color: var(--green);
    text-shadow: 0 0 12px rgba(0,255,90,0.8);
    letter-spacing: 0.10em;
    font-size: 14px;
    opacity: 0;
  }

  #startHint.visible { opacity: 0.92; }

  @media (max-width: 880px) {
    #categoryGrid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .categoryCard { min-height: 124px; }
  }

  @media (max-width: 520px) {
    #homeScreen { padding: 18px; align-items: flex-start; overflow: auto; }
    .homeInner { padding-top: 18px; }
    #categoryGrid { grid-template-columns: 1fr; }
    .categoryCard { min-height: 112px; }
    #trackTitle { font-size: 11px; }
  }
</style>
</head>

`;

const CATEGORY_RULES = [
  {
    id: "rsvp",
    name: "RSVP / Unified Theory",
    glyph: "ΦvS",
    visualizer: "field",
    match: /(rsvp|tartan|hydra|scalar|plenum|flyxion|unifying|unified|field|cosmic|galaxies|cosmos|células|mente_y_empresas|كل_شيء|توحيد)/i
  },
  {
    id: "ai",
    name: "AI / Alignment / Platforms",
    glyph: "AI",
    visualizer: "glitch",
    match: /(ai|algorithm|hallucination|hallucinates|tokens|synthetic|github|platform|apps|servers|model|llm|federated|trustworthy|digital|internet|clone|feed|tech|google|IA|الذكاء)/i
  },
  {
    id: "physics",
    name: "Physics / Cosmology",
    glyph: "Ω",
    visualizer: "orbit",
    match: /(physics|gravity|spacetime|universe|entropy|thermodynamic|thermodynamics|quantum|matter|time|inflation|big_bang|cosmic|law|laws|energy|irreversibility|irreversible|الفيزياء|الجاذبية|اللهب|الحجر)/i
  },
  {
    id: "mind",
    name: "Mind / Identity / Consciousness",
    glyph: "ψ",
    visualizer: "lissajous",
    match: /(brain|mind|identity|self|consciousness|thought|perception|cognition|emotion|psych|lacanian|refractive|compiled_self|wordless|human_reasoning|mente|conciencia|cerebro|الوعي|الهوية)/i
  },
  {
    id: "math",
    name: "Math / Geometry / Formal Systems",
    glyph: "∴",
    visualizer: "geometry",
    match: /(math|mathematical|geometry|geometric|proof|formal|algebra|associahedra|amplituhedron|abstraction|invariant|topolog|constraint|ledger|stable|simplicity|complexity|meaning)/i
  },
  {
    id: "society",
    name: "Society / Systems / Economy",
    glyph: "▦",
    visualizer: "network",
    match: /(society|civilization|capital|money|jobs|economy|systems|structural|ownership|violence|austerity|war|gig|tollbooth|survival|platforms|civilización|ingeniería|violencia|colapso)/i
  },
  {
    id: "experimental",
    name: "Experimental / Music / Misc",
    glyph: "◌",
    visualizer: "hybrid",
    match: /.*/i
  }
];

const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("audio");
const homeScreen = document.getElementById("homeScreen");
const categoryGrid = document.getElementById("categoryGrid");
const hud = document.getElementById("hud");
const homeButton = document.getElementById("homeButton");
const tracksButton = document.getElementById("tracksButton");
const drawer = document.getElementById("drawer");
const drawerTitle = document.getElementById("drawerTitle");
const trackList = document.getElementById("trackList");
const trackTitle = document.getElementById("trackTitle");
const categoryTitle = document.getElementById("categoryTitle");
const startHint = document.getElementById("startHint");

let audioCtx, analyser, source, freqData, timeData;
let currentCategory = null;
let currentTrack = null;
let started = false;
let seed = 1;
let rng = mulberry32(seed);
let particles = [];
let state = "home";

function cleanName(file) {
  return file
    .replace(/\.mp3$/i, "")
    .replace(/_/g, " ")
    .replace(/--/g, " — ")
    .replace(/\s+/g, " ")
    .trim();
}

function seedFromString(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function classifyTrack(file) {
  for (const cat of CATEGORY_RULES) {
    if (cat.match.test(file)) return cat.id;
  }
  return "experimental";
}

const allTracks = TRACKS_TEXT
  .split(/\n+/)
  .map(x => x.trim())
  .filter(Boolean)
  .filter(x => /\.mp3$/i.test(x));

const categories = CATEGORY_RULES.map(rule => ({ ...rule, tracks: [] }));
const catById = Object.fromEntries(categories.map(c => [c.id, c]));

for (const file of allTracks) {
  catById[classifyTrack(file)].tracks.push(file);
}

for (const cat of categories) {
  cat.tracks.sort((a, b) => cleanName(a).localeCompare(cleanName(b)));
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(innerWidth * dpr);
  canvas.height = Math.floor(innerHeight * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

addEventListener("resize", resize);
resize();

function setupAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.84;
  source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.fftSize);
}

async function startAudio() {
  setupAudio();
  if (audioCtx.state === "suspended") await audioCtx.resume();
  try {
    await audio.play();
    started = true;
    startHint.classList.remove("visible");
  } catch (err) {
    startHint.classList.add("visible");
    console.warn("Audio could not start:", err);
  }
}

function setTrack(file, autoplay = true) {
  currentTrack = file;
  seed = seedFromString(file);
  rng = mulberry32(seed);
  particles = makeParticles(100 + Math.floor(rng() * 80));
  audio.src = encodeURI(file);
  audio.load();
  trackTitle.textContent = cleanName(file);
  renderTrackList();
  if (autoplay) startAudio();
}

function openCategory(catId) {
  currentCategory = catById[catId];
  state = "player";
  homeScreen.classList.add("hidden");
  hud.classList.add("visible");
  drawer.classList.remove("open");
  categoryTitle.textContent = currentCategory.name.toUpperCase();
  drawerTitle.textContent = currentCategory.name + " — TRACKS";
  setTrack(currentCategory.tracks[0], true);
}

function goHome() {
  state = "home";
  homeScreen.classList.remove("hidden");
  hud.classList.remove("visible");
  drawer.classList.remove("open");
  startHint.classList.remove("visible");
  audio.pause();
}

function renderCategories() {
  categoryGrid.innerHTML = "";
  for (const cat of categories) {
    const button = document.createElement("button");
    button.className = "categoryCard";
    button.innerHTML = `<strong>${cat.name}</strong><span>${cat.glyph}</span><small>${cat.tracks.length} tracks · ${cat.visualizer}</small>`;
    button.addEventListener("click", () => openCategory(cat.id));
    categoryGrid.appendChild(button);
  }
}

function renderTrackList() {
  if (!currentCategory) return;
  trackList.innerHTML = "";
  for (const file of currentCategory.tracks) {
    const button = document.createElement("button");
    button.className = "trackItem" + (file === currentTrack ? " active" : "");
    button.textContent = cleanName(file);
    button.addEventListener("click", () => {
      setTrack(file, true);
      drawer.classList.remove("open");
    });
    trackList.appendChild(button);
  }
}

homeButton.addEventListener("click", goHome);
tracksButton.addEventListener("click", e => {
  e.stopPropagation();
  drawer.classList.toggle("open");
});

canvas.addEventListener("pointerdown", async () => {
  if (state !== "player") return;
  if (!started || audio.paused) await startAudio();
  else audio.pause();
});

document.addEventListener("pointerdown", e => {
  if (!drawer.classList.contains("open")) return;
  if (drawer.contains(e.target) || tracksButton.contains(e.target)) return;
  drawer.classList.remove("open");
});

audio.addEventListener("ended", () => {
  if (!currentCategory || !currentTrack) return;
  const i = currentCategory.tracks.indexOf(currentTrack);
  const next = currentCategory.tracks[(i + 1) % currentCategory.tracks.length];
  setTrack(next, true);
});

function getLevels() {
  if (!analyser) return { bass: 0, mid: 0, high: 0, volume: 0 };
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);
  let bass = 0, mid = 0, high = 0, volume = 0;
  for (let i = 0; i < 52; i++) bass += freqData[i];
  for (let i = 52; i < 260; i++) mid += freqData[i];
  for (let i = 260; i < 760; i++) high += freqData[i];
  for (let i = 0; i < timeData.length; i++) {
    const v = (timeData[i] - 128) / 128;
    volume += v * v;
  }
  return {
    bass: bass / (52 * 255),
    mid: mid / (208 * 255),
    high: high / (500 * 255),
    volume: Math.sqrt(volume / timeData.length)
  };
}

function fade(w, h) {
  ctx.fillStyle = "rgba(0, 5, 0, 0.22)";
  ctx.fillRect(0, 0, w, h);
}

function phosphorLine(x1, y1, x2, y2, alpha = 0.7, width = 1) {
  ctx.shadowBlur = 14;
  ctx.shadowColor = "#00ff66";
  ctx.strokeStyle = `rgba(140,255,150,${alpha})`;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawFrame(w, h, t, levels) {
  const cx = w / 2;
  const cy = h / 2;
  const r = Math.min(w, h) * 0.34;
  ctx.save();
  ctx.translate(cx, cy);

  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(0, 0, r + i * 9, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(120,255,135,${0.12 - i * 0.015})`;
    ctx.lineWidth = i === 0 ? 2.2 : 1.2;
    ctx.stroke();
  }

  ctx.rotate(t * (0.000045 + (seed % 7) * 0.000004));
  const ticks = 28 + (seed % 20);
  for (let i = 0; i < ticks; i++) {
    const a = i / ticks * Math.PI * 2;
    const len = i % 4 === 0 ? 22 : 11;
    const r1 = r + 12;
    const r2 = r + 12 + len + levels.bass * 18;
    phosphorLine(Math.cos(a) * r1, Math.sin(a) * r1, Math.cos(a) * r2, Math.sin(a) * r2, 0.13, 1);
  }

  ctx.restore();
}

function drawNoise(w, h, amount = 60) {
  ctx.fillStyle = "rgba(150,255,150,0.055)";
  for (let i = 0; i < amount; i++) {
    ctx.fillRect(Math.random() * w, Math.random() * h, Math.random() * 2, Math.random() * 2);
  }
}

function visualizerLissajous(w, h, t, levels) {
  drawFrame(w, h, t, levels);
  const cx = w / 2, cy = h / 2;
  const scale = Math.min(w, h) * (0.20 + levels.bass * 0.16);
  const a = 2 + (seed % 5);
  const b = 3 + ((seed >> 3) % 5);
  const phase = t * (0.00016 + (seed % 9) * 0.00001) + levels.mid * Math.PI;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.shadowBlur = 22 + levels.bass * 30;
  ctx.shadowColor = "#00ff66";
  ctx.strokeStyle = `rgba(145,255,150,${0.56 + levels.volume * 0.7})`;
  ctx.lineWidth = 1.2 + levels.bass * 2.5;
  ctx.beginPath();
  for (let i = 0; i <= 1000; i++) {
    const th = i / 1000 * Math.PI * 2;
    const jitter = Math.sin(th * (19 + seed % 31) + t * 0.002) * levels.high * 18;
    const x = Math.sin(a * th + phase) * scale + jitter;
    const y = Math.sin(b * th) * scale * (0.78 + levels.mid * 0.36);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.restore();
}

function visualizerField(w, h, t, levels) {
  drawFrame(w, h, t, levels);
  const cx = w / 2, cy = h / 2;
  const grid = 15;
  const span = Math.min(w, h) * 0.62;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(Math.sin(t * 0.00005) * 0.12);
  for (let iy = -grid; iy <= grid; iy++) {
    for (let ix = -grid; ix <= grid; ix++) {
      const x = ix / grid * span / 2;
      const y = iy / grid * span / 2;
      const d = Math.hypot(x, y) + 1;
      if (d > span * 0.48) continue;
      const a = Math.atan2(y, x) + Math.sin(d * 0.016 + t * 0.001 + seed) + levels.mid * 2;
      const len = 5 + levels.bass * 18 + ((ix * iy + seed) % 7);
      phosphorLine(x, y, x + Math.cos(a) * len, y + Math.sin(a) * len, 0.16 + levels.volume * 0.5, 1);
    }
  }
  ctx.restore();
}

function visualizerGlitch(w, h, t, levels) {
  const rows = 34;
  const cx = w / 2, cy = h / 2;
  drawFrame(w, h, t, levels);
  ctx.save();
  ctx.translate(cx, cy);
  const span = Math.min(w, h) * 0.58;
  for (let i = 0; i < rows; i++) {
    const y = -span / 2 + i / rows * span;
    const amp = Math.sin(i * 9.7 + t * 0.006 + seed) * (8 + levels.high * 42);
    const x1 = -span / 2 + amp;
    const x2 = span / 2 + amp * 0.35;
    phosphorLine(x1, y, x2, y, 0.06 + levels.mid * 0.42, 1 + levels.bass * 2);
  }
  for (let i = 0; i < 16 + levels.high * 30; i++) {
    const y = (rng() - 0.5) * span;
    const x = (rng() - 0.5) * span;
    ctx.strokeStyle = `rgba(140,255,150,${0.08 + levels.high * 0.22})`;
    ctx.strokeRect(x, y, rng() * 90, 4 + rng() * 14);
  }
  ctx.restore();
}

function visualizerOrbit(w, h, t, levels) {
  drawFrame(w, h, t, levels);
  const cx = w / 2, cy = h / 2;
  const base = Math.min(w, h) * 0.08;
  ctx.save();
  ctx.translate(cx, cy);
  const shells = 7 + (seed % 5);
  for (let s = 1; s <= shells; s++) {
    const r = base * s * (0.64 + levels.bass * 0.18);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(140,255,150,${0.05 + s / shells * 0.08})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    const bodies = 2 + ((seed + s) % 5);
    for (let b = 0; b < bodies; b++) {
      const a = t * (0.00012 + s * 0.000018) * (b % 2 ? -1 : 1) + b * Math.PI * 2 / bodies + seed;
      const x = Math.cos(a) * r;
      const y = Math.sin(a) * r * (0.6 + 0.3 * Math.sin(seed + s));
      ctx.beginPath();
      ctx.arc(x, y, 2 + levels.mid * 7, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(160,255,160,${0.24 + levels.volume * 0.7})`;
      ctx.shadowBlur = 14;
      ctx.shadowColor = "#00ff66";
      ctx.fill();
    }
  }
  ctx.restore();
}

function visualizerGeometry(w, h, t, levels) {
  drawFrame(w, h, t, levels);
  const cx = w / 2, cy = h / 2;
  ctx.save();
  ctx.translate(cx, cy);
  const sides = 3 + (seed % 6);
  const layers = 9;
  for (let l = 0; l < layers; l++) {
    const r = Math.min(w, h) * (0.06 + l * 0.027 + levels.bass * 0.018);
    const rot = t * (0.00008 + l * 0.000018) * (l % 2 ? -1 : 1) + seed;
    ctx.beginPath();
    for (let i = 0; i <= sides; i++) {
      const a = rot + i / sides * Math.PI * 2;
      const x = Math.cos(a) * r;
      const y = Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(145,255,150,${0.08 + l / layers * 0.12 + levels.mid * 0.24})`;
    ctx.lineWidth = 1 + levels.bass * 1.5;
    ctx.shadowBlur = 12;
    ctx.shadowColor = "#00ff66";
    ctx.stroke();
  }
  ctx.restore();
}

function makeParticles(n) {
  const arr = [];
  const r = mulberry32(seed);
  for (let i = 0; i < n; i++) {
    arr.push({
      x: r() * 2 - 1,
      y: r() * 2 - 1,
      vx: (r() - 0.5) * 0.004,
      vy: (r() - 0.5) * 0.004,
      m: r()
    });
  }
  return arr;
}

function visualizerNetwork(w, h, t, levels) {
  drawFrame(w, h, t, levels);
  const cx = w / 2, cy = h / 2;
  const span = Math.min(w, h) * 0.27;
  ctx.save();
  ctx.translate(cx, cy);
  for (const p of particles) {
    p.x += p.vx * (1 + levels.mid * 6);
    p.y += p.vy * (1 + levels.mid * 6);
    if (Math.abs(p.x) > 1) p.vx *= -1;
    if (Math.abs(p.y) > 1) p.vy *= -1;
  }
  const maxD = 0.22 + levels.bass * 0.12;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const a = particles[i], b = particles[j];
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      if (d < maxD) {
        phosphorLine(a.x * span, a.y * span, b.x * span, b.y * span, (1 - d / maxD) * (0.08 + levels.volume * 0.32), 1);
      }
    }
  }
  ctx.fillStyle = `rgba(160,255,160,${0.22 + levels.volume * 0.5})`;
  for (const p of particles) {
    ctx.fillRect(p.x * span - 1, p.y * span - 1, 2, 2);
  }
  ctx.restore();
}

function visualizerHybrid(w, h, t, levels) {
  const choice = seed % 5;
  if (choice === 0) visualizerLissajous(w, h, t, levels);
  else if (choice === 1) visualizerOrbit(w, h, t, levels);
  else if (choice === 2) visualizerGeometry(w, h, t, levels);
  else if (choice === 3) visualizerGlitch(w, h, t, levels);
  else visualizerNetwork(w, h, t, levels);
}

function animate(t) {
  const w = innerWidth;
  const h = innerHeight;
  const levels = getLevels();
  fade(w, h);

  if (state === "home") {
    const pulse = 0.04 + Math.sin(t * 0.001) * 0.02;
    ctx.save();
    ctx.translate(w / 2, h / 2);
    for (let i = 0; i < 11; i++) {
      ctx.beginPath();
      ctx.arc(0, 0, Math.min(w, h) * (0.08 + i * 0.04), 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(120,255,130,${pulse / (i + 1)})`;
      ctx.stroke();
    }
    ctx.restore();
  } else if (currentCategory) {
    if (currentCategory.visualizer === "field") visualizerField(w, h, t, levels);
    else if (currentCategory.visualizer === "glitch") visualizerGlitch(w, h, t, levels);
    else if (currentCategory.visualizer === "orbit") visualizerOrbit(w, h, t, levels);
    else if (currentCategory.visualizer === "lissajous") visualizerLissajous(w, h, t, levels);
    else if (currentCategory.visualizer === "geometry") visualizerGeometry(w, h, t, levels);
    else if (currentCategory.visualizer === "network") visualizerNetwork(w, h, t, levels);
    else visualizerHybrid(w, h, t, levels);
  }

  drawNoise(w, h, state === "home" ? 30 : 70 + levels.high * 120);
  requestAnimationFrame(animate);
}

renderCategories();
requestAnimationFrame(animate);
</script>
