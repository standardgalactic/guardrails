<!-- high noise -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><title>entropy</title>
<style>html,body{margin:0;background:black;overflow:hidden;color:#ff5555;font-family:monospace}</style></head>
<body><canvas id="c"></canvas><script>
const ctx=c.getContext("2d");c.width=innerWidth;c.height=innerHeight;
const P=Array.from({length:200},()=>({x:Math.random()*c.width,y:Math.random()*c.height}));
function draw(){
ctx.fillStyle="rgba(0,0,0,0.2)";ctx.fillRect(0,0,c.width,c.height);
P.forEach(p=>{
p.x+=(Math.random()-0.5)*8;
p.y+=(Math.random()-0.5)*8;
ctx.fillStyle="#ff5555";ctx.fillRect(p.x,p.y,2,2);
});
requestAnimationFrame(draw);}
draw();
</script></body></html>
