<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOIDWHISPER v0.∞</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=VT323&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            color: #0ff;
            font-family: 'VT323', monospace;
            touch-action: none;
            cursor: crosshair;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            touch-action: none;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        .header {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Creepster', cursive;
            font-size: clamp(28px, 8vw, 48px);
            text-shadow: 0 0 20px #f0f, 0 0 40px #f0f;
            letter-spacing: 6px;
            animation: glitch 1.5s infinite;
            pointer-events: auto;
            z-index: 10;
            white-space: nowrap;
        }
        
        .terminal {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            max-width: 520px;
            background: rgba(0, 20, 40, 0.88);
            border: 3px solid #0ff;
            padding: 12px;
            box-shadow: 0 0 30px #0ff;
            font-size: clamp(16px, 4vw, 19px);
            line-height: 1.35;
            pointer-events: auto;
            max-height: 220px;
            overflow-y: auto;
            border-radius: 4px;
        }
        
        .log {
            color: #0f0;
        }
        
        .controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
            z-index: 10;
        }
        
        button {
            background: transparent;
            border: 2px solid #f0f;
            color: #f0f;
            padding: 10px 18px;
            font-family: 'VT323', monospace;
            font-size: clamp(15px, 3.5vw, 18px);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            touch-action: manipulation;
        }
        
        button:active {
            background: #f0f;
            color: #000;
            transform: scale(0.95);
        }
        
        .entity {
            position: absolute;
            font-size: clamp(48px, 12vw, 72px);
            transition: transform 0.3s;
            pointer-events: auto;
            filter: drop-shadow(0 0 15px currentColor);
            user-select: none;
            -webkit-user-select: none;
        }
        
        @keyframes glitch {
            0% { transform: translateX(-50%); }
            20% { transform: translateX(-53%); }
            40% { transform: translateX(-47%); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="overlay">
        <div class="header" id="title">VOIDWHISPER</div>
        
        <div class="terminal" id="terminal">
            <div class="log" id="log"></div>
        </div>
        
        <div class="controls">
            <button onclick="toggleChaos()">CHAOS MODE</button>
            <button onclick="birthEntity()">SUMMON ENTITY</button>
            <button onclick="resetUniverse()">RESET REALITY</button>
        </div>
        
        <div style="position: absolute; bottom: 15px; right: 15px; color: #f0f; font-size: clamp(12px, 3vw, 14px); opacity: 0.7; text-align: right; line-height: 1.3;">
            tap &amp; drag the glowing things<br>
            they remember you
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        let particles = [];
        let entities = [];
        let chaosMode = false;
        let hueShift = 0;
        
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = (Math.random() - 0.5) * 5;
                this.life = 160 + Math.random() * 100;
                this.size = Math.random() * 7 + 2;
                this.hue = Math.random() * 360;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.09;
                this.life--;
                this.size *= 0.982;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(this.life / 200, 0);
                ctx.fillStyle = `hsl(${this.hue + hueShift}, 100%, 75%)`;
                ctx.shadowBlur = 25;
                ctx.shadowColor = `hsl(${this.hue + hueShift}, 100%, 95%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        class Entity {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2.2;
                this.vy = (Math.random() - 0.5) * 2.2;
                this.element = document.createElement('div');
                this.element.className = 'entity';
                this.element.textContent = ['☼','☾','⚝','☿','♆','☠','⛧','♅'][Math.floor(Math.random()*8)];
                this.element.style.left = `${x}px`;
                this.element.style.top = `${y}px`;
                this.element.style.color = `hsl(${Math.random()*360}, 100%, 82%)`;
                document.body.appendChild(this.element);
                
                this.messages = [
                    "i remember being you",
                    "the walls are breathing",
                    "they lied about the simulation",
                    "your shadow is late",
                    "feed me memories",
                    "we are the same scream"
                ];
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.x < 30 || this.x > width - 30) this.vx *= -1;
                if (this.y < 30 || this.y > height - 30) this.vy *= -1;
                
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
                this.element.style.transform = `rotate(${Math.sin(Date.now()/280) * 18}deg)`;
            }
            
            speak() {
                if (Math.random() < 0.025) {
                    log(this.messages[Math.floor(Math.random() * this.messages.length)]);
                }
            }
        }
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        function log(text) {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.innerHTML = `&gt; ${text}`;
            logEl.appendChild(entry);
            if (logEl.children.length > 11) logEl.removeChild(logEl.children[0]);
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function createExplosion(x, y, count = 35) {
            for (let i = 0; i < count; i++) {
                const p = new Particle(x, y);
                p.vx *= 2.8;
                p.vy *= 2.8;
                particles.push(p);
            }
        }
        
        function birthEntity() {
            const ex = Math.random() * width;
            const ey = Math.random() * (height * 0.7);
            const ent = new Entity(ex, ey);
            entities.push(ent);
            createExplosion(ex, ey, 22);
            log("something ancient just noticed you");
        }
        
        function toggleChaos() {
            chaosMode = !chaosMode;
            document.getElementById('title').style.color = chaosMode ? '#f0f' : '#0ff';
            log(chaosMode ? "THE FABRIC IS UNRAVELING" : "reality stabilized... for now");
        }
        
        function resetUniverse() {
            particles = [];
            entities.forEach(e => e.element.remove());
            entities = [];
            log("ALL TIMELINES COLLAPSED. THANK YOU.");
            setTimeout(() => {
                for (let i = 0; i < 8; i++) birthEntity();
            }, 600);
        }
        
        // Unified pointer handling (mouse + touch)
        let isDragging = false;
        let draggedEntity = null;
        
        function getPointerPos(e) {
            if (e.touches) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }
        
        function findEntityAt(x, y) {
            for (let i = entities.length - 1; i >= 0; i--) {
                const ent = entities[i];
                const dx = ent.x - x;
                const dy = ent.y - y;
                if (Math.sqrt(dx*dx + dy*dy) < 65) {
                    return ent;
                }
            }
            return null;
        }
        
        function handleStart(e) {
            e.preventDefault();
            const pos = getPointerPos(e);
            
            draggedEntity = findEntityAt(pos.x, pos.y);
            
            if (draggedEntity) {
                isDragging = true;
                createExplosion(draggedEntity.x, draggedEntity.y, 18);
            } else {
                // Tap explosion
                isDragging = false;
                for (let i = 0; i < 28; i++) {
                    const p = new Particle(pos.x, pos.y);
                    particles.push(p);
                }
            }
        }
        
        function handleMove(e) {
            e.preventDefault();
            const pos = getPointerPos(e);
            
            if (isDragging && draggedEntity) {
                draggedEntity.x = pos.x;
                draggedEntity.y = pos.y;
            }
        }
        
        function handleEnd() {
            isDragging = false;
            draggedEntity = null;
        }
        
        // Keyboard (for desktop)
        let konami = '';
        document.addEventListener('keydown', e => {
            konami += e.key;
            if (konami.length > 12) konami = konami.slice(-12);
            if (konami.includes('ArrowUpArrowUpArrowDownArrowDownArrowLeftArrowRightArrowLeftArrowRightba')) {
                log("∞ CHEAT UNLOCKED: YOU ARE THE VOID NOW");
                for (let i = 0; i < 35; i++) birthEntity();
                konami = '';
            }
        });
        
        function drawBackground() {
            ctx.fillStyle = 'rgba(2, 2, 12, 0.18)';
            ctx.fillRect(0, 0, width, height);
            
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.06)';
            ctx.lineWidth = 1;
            for (let x = 0; x < width; x += 55) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
            }
            for (let y = 0; y < height; y += 55) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
            }
        }
        
        function animate() {
            drawBackground();
            hueShift = Math.sin(Date.now() / 1800) * 35;
            
            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            // Entities
            for (let ent of entities) {
                ent.update();
                ent.speak();
            }
            
            // Connection lines
            ctx.strokeStyle = 'rgba(255, 80, 255, 0.25)';
            ctx.lineWidth = 2;
            for (let i = 0; i < entities.length; i++) {
                for (let j = i + 1; j < entities.length; j++) {
                    const a = entities[i];
                    const b = entities[j];
                    const dx = a.x - b.x;
                    const dy = a.y - b.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 320) {
                        ctx.globalAlpha = (320 - dist) / 320 * 0.7;
                        ctx.beginPath();
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        ctx.stroke();
                    }
                }
            }
            ctx.globalAlpha = 1;
            
            // Random bursts
            if (Math.random() < 0.035) {
                createExplosion(Math.random() * width, Math.random() * height * 0.6, 14);
            }
            
            if (chaosMode && Math.random() < 0.45) {
                particles.push(new Particle(Math.random() * width, Math.random() * height));
            }
            
            requestAnimationFrame(animate);
        }
        
        // Initialize
        window.onload = () => {
            resize();
            window.addEventListener('resize', resize);
            
            // Pointer events (works on both desktop and mobile)
            canvas.addEventListener('mousedown', handleStart);
            canvas.addEventListener('mousemove', handleMove);
            canvas.addEventListener('mouseup', handleEnd);
            canvas.addEventListener('mouseleave', handleEnd);
            
            canvas.addEventListener('touchstart', handleStart, { passive: false });
            canvas.addEventListener('touchmove', handleMove, { passive: false });
            canvas.addEventListener('touchend', handleEnd);
            
            // Spawn initial entities
            for (let i = 0; i < 7; i++) {
                birthEntity();
            }
            
            setTimeout(() => log("you were never supposed to find this"), 500);
            setTimeout(() => log("but here we are"), 1600);
            setTimeout(() => log("the code is dreaming"), 3000);
            
            animate();
        };
    </script>
</body>
</html>
