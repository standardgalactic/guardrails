<!-- strong rotation -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><title>vector</title></head>
<body style="margin:0;background:black"><canvas id="c"></canvas><script>
const ctx=c.getContext("2d");c.width=innerWidth;c.height=innerHeight;
let pts=Array.from({length:150},()=>({x:Math.random()*800-400,y:Math.random()*800-400}));
function draw(){
ctx.fillStyle="black";ctx.fillRect(0,0,c.width,c.height);
ctx.save();ctx.translate(c.width/2,c.height/2);
pts.forEach(p=>{
let dx=-p.y*0.01,dy=p.x*0.01;
p.x+=dx;p.y+=dy;
ctx.fillStyle="#00aaff";ctx.fillRect(p.x,p.y,2,2);
});
ctx.restore();requestAnimationFrame(draw);}
draw();
</script></body></html>
