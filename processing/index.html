<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lava Thought Visualizer</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
background:#000;
color:#7cff7c;
font-family:monospace;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:16px 0;
}

/* title */
.title{
text-align:center;
font-size:clamp(12px,3vw,15px);
letter-spacing:0.18em;
text-transform:uppercase;
color:#00ff88;
text-shadow:0 0 8px #00ff66, 0 0 20px rgba(0,255,100,0.3);
margin-bottom:10px;
opacity:0.85;
}

/* controls */
.controls{
display:flex;
gap:10px;
justify-content:center;
margin-top:16px;
margin-bottom:80px;
}

button{
background:#001400;
border:1px solid #00ff00;
color:#7cff7c;
padding:8px 14px;
cursor:pointer;
font-family:monospace;
transition:background 0.15s, box-shadow 0.15s;
}

button:hover{
background:#002800;
box-shadow:0 0 8px rgba(0,255,0,0.4);
}

/* frame */
.screen{
position:relative;
padding:14px;
border:2px solid #0f0;
background:#001000;
box-shadow:
0 0 10px #0f0,
inset 0 0 40px rgba(0,255,0,0.12);
line-height:0;
}

.screen::after{
content:"";
position:absolute;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(0,255,0,0.04) 0px,
rgba(0,255,0,0.04) 1px,
transparent 2px,
transparent 4px
);
}

/* toggle */
#shapeToggle{
position:absolute;
top:-28px;
left:50%;
transform:translateX(-50%);
width:50px;
height:50px;
cursor:pointer;
z-index:10;
}

#shapeToggle canvas{
width:50px;
height:50px;
display:block;
}

/* portal */
#viz{
width:min(420px,82vw);
height:min(420px,82vw);
border-radius:50%;
background:#000;
border:2px solid rgba(0,255,0,0.5);
box-shadow:
0 0 25px rgba(0,255,120,0.25) inset,
0 0 12px rgba(0,255,0,0.6),
0 0 40px rgba(0,255,120,0.15);
display:block;
}

/* subtitles — fixed, always above everything */
.subs{
position:fixed;
bottom:14px;
left:0;
right:0;
margin:0 auto;

width:min(520px,88vw);

padding:8px 18px;
min-height:2.6em;
max-height:5.5em;
overflow:visible;

text-align:center;
text-shadow:0 0 6px #00ff66;

line-height:1.4;
font-size:clamp(12px,3.2vw,15px);

display:flex;
align-items:center;
justify-content:center;

white-space:normal;
overflow-wrap:break-word;
word-break:break-word;

pointer-events:none;
z-index:100;

background:rgba(0,20,0,0.55);
backdrop-filter:blur(3px);
border:1px solid rgba(0,255,0,0.25);
border-radius:8px;

transform-origin:center;
transition:transform 0.08s ease, opacity 0.15s ease;
}
</style>
</head>

<body>

<div class="title">Lava Thought Visualizer</div>

<div class="screen">
<div id="shapeToggle"></div>
<canvas id="viz"></canvas>
</div>

<div id="subs" class="subs"></div>

<div class="controls">
<button id="play">Play</button>
<button id="subsBtn">Subs On</button>
</div>

<audio id="audio">
<source id="src">
<track id="trackEl" kind="subtitles" default>
</audio>

<script>

/* TRACKS */

const tracks = [
"The_Geometry_of_Human_Thought_Trajectories.mp3",
"The_Rhythmic_Geometry_of_Human_Thought.mp3"
]

let index = 0

/* ELEMENTS */

const audio = document.getElementById("audio")
const src = document.getElementById("src")
const trackEl = document.getElementById("trackEl")
const play = document.getElementById("play")
const subsBtn = document.getElementById("subsBtn")
const subs = document.getElementById("subs")
const toggleDiv = document.getElementById("shapeToggle")

let subsOn = true

/* SHAPE TOGGLE */

const shapeCanvas = document.createElement("canvas")
shapeCanvas.width = 50
shapeCanvas.height = 50
const sc = shapeCanvas.getContext("2d")
toggleDiv.appendChild(shapeCanvas)

function drawShape(){
sc.clearRect(0,0,50,50)
sc.strokeStyle="#00ff66"
sc.lineWidth=2

if(index===0){
sc.beginPath()
sc.moveTo(25,5)
sc.lineTo(45,45)
sc.lineTo(5,45)
sc.closePath()
sc.stroke()
}else{
sc.beginPath()
sc.arc(25,25,18,0,Math.PI*2)
sc.stroke()
}
}

toggleDiv.onclick = ()=> load(index+1,true)

/* LOAD */

function load(i,auto=false){

index = i % tracks.length
const file = tracks[index]

src.src = file
trackEl.src = file.replace(".mp3",".vtt")

audio.load()

subs.textContent = ""
play.textContent = auto ? "Pause" : "Play"

audio.onloadedmetadata = ()=>{

const t = audio.textTracks[0]

if(t){
t.mode="hidden"

t.oncuechange = ()=>{
if(!subsOn){ subs.textContent=""; return }
const cue = t.activeCues[0]
subs.textContent = cue ? cue.text : ""
}
}

if(auto){
audio.play()
play.textContent="Pause"
}

drawShape()
}
}

load(0)

/* CONTROLS */

play.onclick = async ()=>{
initAudio()
if(ctx && ctx.state === "suspended") await ctx.resume()

if(audio.paused){
await audio.play()
play.textContent="Pause"
}else{
audio.pause()
play.textContent="Play"
}
}

subsBtn.onclick = ()=>{
subsOn = !subsOn
subsBtn.textContent = subsOn ? "Subs On":"Subs Off"
if(!subsOn) subs.textContent=""
}

audio.onended = ()=> load(index+1,true)

/* AUDIO */

let ctx, analyser, buf
let energy=0, smoothEnergy=0

function initAudio(){
if(ctx) return
ctx = new (window.AudioContext||window.webkitAudioContext)()
analyser = ctx.createAnalyser()
analyser.fftSize = 512
const srcNode = ctx.createMediaElementSource(audio)
srcNode.connect(analyser)
analyser.connect(ctx.destination)
buf = new Uint8Array(analyser.fftSize)
}

function updateEnergy(){
if(analyser){
analyser.getByteTimeDomainData(buf)
let e=0
for(let i=0;i<buf.length;i++){
let d=buf[i]-128
e+=d*d
}
e/=buf.length
energy=Math.min(e/4000,1)
smoothEnergy += (energy - smoothEnergy)*0.05
}
}

/* CANVAS */

const canvas = document.getElementById("viz")
const c = canvas.getContext("2d")

const size = 260
canvas.width = size
canvas.height = size

/* BLOBS */

const blobs = Array.from({length:7},()=>({
x:Math.random()*size,
y:Math.random()*size,
vx:0,
vy:0,
baseR:14+Math.random()*14,
r:0
}))

let globalPhase = 0

function flowField(x,y){
const cx=size*0.5
const dx=(x-cx)/size

const updraft = Math.exp(-dx*dx*8)*0.03
const downdraft = -Math.exp(-Math.abs(dx)*3)*0.015

const vy = updraft + downdraft

const swirl =
Math.sin(y*0.04 + globalPhase)*0.02 +
Math.sin(x*0.03 - globalPhase)*0.015

return { vx: swirl, vy: vy }
}

/* DRAW */

function draw(){

updateEnergy()
globalPhase += 0.0004

c.clearRect(0,0,size,size)

const img = c.createImageData(size,size)

for(let x=0;x<size;x++){
for(let y=0;y<size;y++){

let sum=0

for(const b of blobs){
let dx=x-b.x
let dy=y-b.y
let d = dx*dx + dy*dy + 0.0001
sum += (b.r*b.r)/d
}

const cx=size/2
const cy=size/2
const dist=Math.hypot(x-cx,y-cy)/(size/2)
const mask = Math.max(0,1 - dist*dist*0.9)

sum *= mask

let i=(y*size+x)*4

if(sum>1.0){
let t=Math.min(sum/4,1)

img.data[i]   = 120 + 120*t + 80*smoothEnergy
img.data[i+1] = 255
img.data[i+2] = 20 + 50*(1-t)
img.data[i+3] = 255
}else{
img.data[i+3]=0
}
}
}

c.putImageData(img,0,0)

/* motion */

for(const b of blobs){

const f = flowField(b.x,b.y)
const buoyancy = 0.015 + smoothEnergy*0.03

b.vx += f.vx*(1+smoothEnergy)
b.vy += f.vy*(1+smoothEnergy)
b.vy -= buoyancy * (0.6 + b.baseR*0.01)

if(b.y < size*0.2){
b.vy += 0.01
}

const temp = 1 - (b.y/size)
const phase = temp*0.8 + smoothEnergy*0.6

b.r = b.baseR*(0.75+phase)

b.vx *= 0.95
b.vy *= 0.95

const turb=0.002*(0.2+smoothEnergy)
b.vx += (Math.random()-0.5)*turb
b.vy += (Math.random()-0.5)*turb

b.x += b.vx
b.y += b.vy

if(b.x<0) b.x+=size
if(b.x>size) b.x-=size

if(b.y<0){ b.y=0; b.vy=Math.abs(b.vy)*0.5 }
if(b.y>size){ b.y=size; b.vy=-Math.abs(b.vy)*0.5 }

}

/* stable subtitle pulse */
subs.style.transform = `scaleY(${1 + smoothEnergy*0.05})`
subs.style.opacity = 0.75 + smoothEnergy*0.25

requestAnimationFrame(draw)
}

draw()

</script>

</body>
</html>
