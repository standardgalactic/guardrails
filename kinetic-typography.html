<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Typography</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: 0, y: 0, radius: 100 };

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            const text = "NON-LINEAR";
            ctx.font = "bold 80px Courier New";
            ctx.fillStyle = "white";
            ctx.fillText(text, (canvas.width / 2) - 250, canvas.height / 2);
            
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < pixels.height; y += 4) {
                for (let x = 0; x < pixels.width; x += 4) {
                    if (pixels.data[(y * 4 * pixels.width) + (x * 4) + 3] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.destX = x;
                this.destY = y;
                this.size = 2;
                this.vx = 0;
                this.vy = 0;
                this.accel = 0.05;
                this.friction = 0.95;
            }

            draw() {
                ctx.fillStyle = `rgba(0, 255, 150, ${Math.random() * 0.5 + 0.5})`;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    this.vx -= (dx / distance) * force * 10;
                    this.vy -= (dy / distance) * force * 10;
                }

                this.vx += (this.destX - this.x) * this.accel;
                this.vy += (this.destY - this.y) * this.accel;
                this.vx *= this.friction;
                this.vy *= this.friction;

                this.x += this.vx;
                this.y += this.vy;
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
