<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardrails · Archipelago</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
    color: #00ffcc;
}

canvas { display: block; }

body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,200,0.05) 0px,
        rgba(0,255,200,0.05) 1px,
        transparent 2px
    );
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* === MAIN PROJECTS (OUTER CONSTELLATION) === */
const outerNodes = [
    { name: "core", file: "core.html" },
    { name: "entropy", file: "entropy.html" },
    { name: "vector", file: "vector.html" },
    { name: "scalar", file: "scalar.html" },
    { name: "collapse", file: "collapse.html" },
    { name: "projection", file: "projection.html" },
    { name: "field", file: "field.html" },
    { name: "constraints", file: "constraints.html" },
    { name: "flow", file: "flow.html" },
    { name: "observer", file: "observer.html" },
    { name: "memory", file: "memory.html" },
    { name: "torsion", file: "torsion.html" },
    { name: "relaxation", file: "relaxation.html" },
    { name: "coherence", file: "coherence.html" },
    { name: "boundary", file: "boundary.html" },
    { name: "meta", file: "meta.html" }
];

/* === EXPERIMENTAL FILES (INNER OCEAN) === */
const innerNodes = [
    "falling-sand.html",
    "unmade-things.html",
    "void-whisper.html",
    "emergent.entropy.html",
    "kinetic-typography.html",
    "nebula-nexus.html",
    "untitled-document.html",
    "lightpen.html",
    "echo-chamber.html",
    "living-sound.html",
    "abyssal.html",
    "automatic-loom.html",
    "stochastic-growth.html",
    "soft-catastrophes.html",
    "quiet-museum.html",
    "void-protocol.html"
].map(f => ({ name: f.replace(".html",""), file: f }));

/* === RADII === */
const innerRadius = 250;
const outerRadius = 850;

/* === POSITIONING === */

/* inner = drifting ocean */
innerNodes.forEach(n => {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * innerRadius;

    n.x = Math.cos(angle) * r;
    n.y = Math.sin(angle) * r;

    n.dx = (Math.random() - 0.5) * 0.05;
    n.dy = (Math.random() - 0.5) * 0.05;
});

/* outer = structured constellation */
outerNodes.forEach((n, i) => {
    const angle = (i / outerNodes.length) * Math.PI * 2;
    const r = outerRadius + (Math.random() - 0.5) * 120;

    n.x = Math.cos(angle) * r;
    n.y = Math.sin(angle) * r;
});

/* === CAMERA === */
let cam = { x: 0, y: 0, zoom: 1 };
let dragging = false;
let last = { x: 0, y: 0 };

canvas.addEventListener("mousedown", e => {
    dragging = true;
    last.x = e.clientX;
    last.y = e.clientY;
});

window.addEventListener("mouseup", () => dragging = false);

window.addEventListener("mousemove", e => {
    if (dragging) {
        cam.x -= (e.clientX - last.x) / cam.zoom;
        cam.y -= (e.clientY - last.y) / cam.zoom;
        last.x = e.clientX;
        last.y = e.clientY;
    }
});

canvas.addEventListener("wheel", e => {
    cam.zoom *= (e.deltaY > 0 ? 0.9 : 1.1);
});

/* === CLICK === */
canvas.addEventListener("click", e => {
    const mx = (e.clientX - canvas.width/2) / cam.zoom + cam.x;
    const my = (e.clientY - canvas.height/2) / cam.zoom + cam.y;

    [...innerNodes, ...outerNodes].forEach(n => {
        const dx = mx - n.x;
        const dy = my - n.y;
        if (Math.sqrt(dx*dx + dy*dy) < 10) {
            location.href = n.file;
        }
    });
});

/* === BACKGROUND STARS === */
const stars = Array.from({ length: 400 }, () => ({
    x: (Math.random() - 0.5) * 4000,
    y: (Math.random() - 0.5) * 4000,
    z: Math.random()
}));

/* === SHORELINE (VECTOR OUTLINE) === */
function drawBoundary() {
    ctx.beginPath();

    const segments = 120;
    for (let i = 0; i <= segments; i++) {
        const a = (i / segments) * Math.PI * 2;

        /* irregular coastline */
        const noise = Math.sin(a * 5) * 15 + Math.sin(a * 11) * 8;
        const r = innerRadius + 80 + noise;

        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }

    ctx.strokeStyle = "rgba(0,255,200,0.08)";
    ctx.lineWidth = 1;
    ctx.stroke();
}

/* === DRAW === */
function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.scale(cam.zoom, cam.zoom);
    ctx.translate(-cam.x, -cam.y);

    /* stars */
    stars.forEach(s => {
        ctx.fillStyle = `rgba(0,255,200,${0.2 + s.z})`;
        ctx.fillRect(s.x, s.y, 1, 1);
    });

    /* boundary */
    drawBoundary();

    /* inner drift */
    innerNodes.forEach(n => {
        n.x += n.dx;
        n.y += n.dy;
    });

    /* inner nodes (dim ocean) */
    innerNodes.forEach(n => {
        ctx.beginPath();
        ctx.arc(n.x, n.y, 2, 0, Math.PI*2);
        ctx.fillStyle = "rgba(0,255,200,0.35)";
        ctx.fill();

        ctx.fillStyle = "rgba(0,255,200,0.25)";
        ctx.fillText(n.name, n.x + 5, n.y - 5);
    });

    /* outer nodes (bright anchors) */
    outerNodes.forEach(n => {
        ctx.beginPath();
        ctx.arc(n.x, n.y, 3, 0, Math.PI*2);
        ctx.fillStyle = "#00ffcc";
        ctx.fill();

        ctx.fillStyle = "rgba(0,255,200,0.9)";
        ctx.fillText(n.name, n.x + 6, n.y - 6);
    });

    ctx.restore();
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
